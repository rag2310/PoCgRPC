syntax = "proto3";

package poc_grpc;

service DataService {
  rpc GetHeavyData (DataRequest) returns (DataResponse);
}

message DataRequest {
  int32 count = 1;
}

message DataResponse {
  repeated UserProfile users = 1;
}

message UserProfile {
  string id = 1;
  string username = 2;
  string email = 3;
  string first_name = 4;
  string last_name = 5;
  string bio = 6;
  Address address = 7;
  repeated TransactionHistory transactions = 8;
  map<string, string> metadata = 9;
  bool is_active = 10;
  double reputation_score = 11;
  int64 joined_at = 12;
}

message Address {
  string street = 1;
  string city = 2;
  string state = 3;
  string zip_code = 4;
  string country = 5;
  Location location = 6;
}

message Location {
  double latitude = 1;
  double longitude = 2;
}

message TransactionHistory {
  string transaction_id = 1;
  double amount = 2;
  string currency = 3;
  string timestamp = 4;
  string status = 5;
  string description = 6;
  repeated string tags = 7;
}
